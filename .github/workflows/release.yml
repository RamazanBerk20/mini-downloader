name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Build native-messaging host
        run: cargo build --release -p minidl-native-host

      - name: Stage native host sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force apps/desktop/src-tauri/binaries | Out-Null
          Copy-Item target/release/minidl-native-host.exe `
            "apps/desktop/src-tauri/binaries/minidl-native-host-${{ matrix.triple }}.exe"

      - name: Stage aria2c + yt-dlp sidecars (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "apps/desktop/src-tauri/binaries"
          # aria2 (pinned upstream release build)
          Invoke-WebRequest -Uri "https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-win-64bit-build1.zip" -OutFile aria2.zip
          Expand-Archive aria2.zip -DestinationPath aria2-tmp
          Copy-Item aria2-tmp/*/aria2c.exe "$bin/aria2c-${{ matrix.triple }}.exe"
          # yt-dlp (latest official single-binary; self-updates in-app afterwards)
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "$bin/yt-dlp-${{ matrix.triple }}.exe"

      - name: Build + bundle + attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Mini Downloader ${{ github.ref_name }}"
          releaseDraft: true
          releaseBody: |
            ## Mini Downloader ${{ github.ref_name }}

            Linux: `.deb` / `.rpm` (depend on distro `aria2` + `ffmpeg`) and `.AppImage`.
            Windows: NSIS `.exe` installer / `.msi` (bundle aria2c + yt-dlp; install
            ffmpeg yourself for video muxing).

  extension:
    needs: build # the draft release must exist before uploading to it
    runs-on: ubuntu-22.04
    # Store-publish secrets (mapped to env so the step `if:` can test them). The
    # job always attaches the current extension zips, but submits them to stores
    # only when the app release tag matches the extension manifest version.
    env:
      AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
      AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
      AMO_CHANNEL: ${{ vars.AMO_CHANNEL }}
      CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
      CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
      CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
      CWS_ITEM_ID: ${{ secrets.CWS_ITEM_ID }}
    steps:
      - uses: actions/checkout@v4
      - id: extension_version
        name: Read extension version
        run: |
          version=$(node -p 'require("./extension/manifest.json").version')
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Package browser extensions
        run: |
          ./scripts/build-extension.sh
          cd dist-ext
          # Archive entries must not be prefixed with `./`: store uploaders
          # require manifest.json to sit at the archive root.
          (cd firefox && zip -qr ../mini-downloader-firefox-${{ steps.extension_version.outputs.version }}.zip *)
          (cd chrome && zip -qr ../mini-downloader-chrome-${{ steps.extension_version.outputs.version }}.zip *)
      - name: Attach extension packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            dist-ext/mini-downloader-firefox-${{ steps.extension_version.outputs.version }}.zip \
            dist-ext/mini-downloader-chrome-${{ steps.extension_version.outputs.version }}.zip \
            --repo "${{ github.repository }}" --clobber

      # Sign / submit the Firefox add-on to AMO. Channel `listed` submits for
      # store review; `unlisted` returns a self-installable signed .xpi which is
      # then attached to the release. A desktop-only release never re-submits an
      # unchanged extension.
      - name: Sign Firefox add-on (AMO)
        if: ${{ env.AMO_API_KEY != '' && github.ref_name == format('v{0}', steps.extension_version.outputs.version) }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx --yes web-ext@8 sign \
            --source-dir dist-ext/firefox \
            --channel "${AMO_CHANNEL:-listed}" \
            --api-key "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET" \
            --artifacts-dir web-ext-artifacts || true
          XPI=$(ls web-ext-artifacts/*.xpi 2>/dev/null | head -1 || true)
          if [ -n "$XPI" ]; then
            gh release upload "${{ github.ref_name }}" "$XPI" --repo "${{ github.repository }}" --clobber
          fi

      # Upload + publish the Chromium build to the Chrome Web Store. Skipped
      # without CWS secrets or when this is a desktop-only release.
      - name: Publish Chrome extension (Web Store)
        if: ${{ env.CWS_CLIENT_ID != '' && github.ref_name == format('v{0}', steps.extension_version.outputs.version) }}
        run: |
          # CWS rejects the `key` field (it assigns the id itself) — strip it.
          node -e "const f='dist-ext/chrome/manifest.json',m=require('./'+f);delete m.key;require('fs').writeFileSync(f,JSON.stringify(m,null,2))"
          npx --yes chrome-webstore-upload-cli@3 upload \
            --source dist-ext/chrome \
            --extension-id "$CWS_ITEM_ID" \
            --client-id "$CWS_CLIENT_ID" \
            --client-secret "$CWS_CLIENT_SECRET" \
            --refresh-token "$CWS_REFRESH_TOKEN" \
            --auto-publish || true

  checksums:
    needs: [build, extension]
    runs-on: ubuntu-22.04
    steps:
      - name: Compute and attach SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir assets && cd assets
          gh release download "${{ github.ref_name }}" --repo "${{ github.repository }}"
          # A retry may download the previous manifest too. Remove it before
          # hashing so SHA256SUMS never contains itself or stale data.
          rm -f SHA256SUMS
          find . -maxdepth 1 -type f -printf '%f\0' | LC_ALL=C sort -z | xargs -0 sha256sum -- > SHA256SUMS
          gh release upload "${{ github.ref_name }}" SHA256SUMS \
            --repo "${{ github.repository }}" --clobber

  # Publish only after every asset (binaries, extension zips, SHA256SUMS) is
  # attached, so users never see a half-populated release.
  publish:
    needs: [build, extension, checksums]
    runs-on: ubuntu-22.04
    steps:
      - name: Flip the draft to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false
