name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Clippy (informational)
        run: cargo clippy --workspace --all-targets

      - name: Rust unit tests (whole workspace)
        run: cargo test --workspace

      - name: Type-check frontend
        working-directory: apps/desktop
        run: ./node_modules/.bin/svelte-check --tsconfig ./tsconfig.json

      - name: Build frontend
        working-directory: apps/desktop
        run: ./node_modules/.bin/vite build

      - name: Smoke-build the app (no bundle)
        working-directory: apps/desktop
        run: pnpm tauri build --no-bundle
