<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title data-i18n="optionsTitle">Mini Downloader Connector Options</title>
    <link rel="stylesheet" href="ui.css" />
  </head>
  <body class="options">
    <main class="panel">
      <h1 data-i18n="extName">Mini Downloader Connector</h1>
      <p class="desc" data-i18n="extDescription">Catch downloads in your browser and hand them to Mini Downloader.</p>

      <div class="field switch-row">
        <label for="enabled" data-i18n="popupCatchDownloads">Catch downloads</label>
        <span class="switch">
          <input type="checkbox" id="enabled" />
          <span class="track"></span>
        </span>
      </div>

      <div class="field">
        <label for="minSize" data-i18n="optionsMinSize">Minimum file size to catch (bytes)</label>
        <div class="input-row">
          <input type="number" id="minSize" min="0" />
          <span id="minSizeMiB" class="unit"></span>
        </div>
        <p class="hint" data-i18n="optionsMinSizeHint">Downloads smaller than this are left to your browser. Default 1048576 (1 MiB).</p>
      </div>

      <div class="field">
        <label for="disabledHosts" data-i18n="optionsDisabledHosts">Disabled sites (one hostname per line)</label>
        <textarea id="disabledHosts" class="mono" rows="5" placeholder="example.com"></textarea>
      </div>

      <div class="field">
        <label for="blacklistExts" data-i18n="optionsBlacklist">Ignored file types (comma-separated)</label>
        <input type="text" id="blacklistExts" class="mono" placeholder="zip, torrent" />
        <p class="hint" data-i18n="optionsBlacklistHint">Downloads of these types stay in the browser.</p>
      </div>

      <div class="field switch-row">
        <label for="blacklistMagnet" data-i18n="optionsMagnetSkip">Leave magnet links to the system</label>
        <span class="switch">
          <input type="checkbox" id="blacklistMagnet" />
          <span class="track"></span>
        </span>
      </div>

      <div class="field">
        <label for="lang" data-i18n="optionsLanguage">Language</label>
        <select id="lang"></select>
      </div>

      <div class="actions">
        <button id="save" class="btn btn-primary" data-i18n="optionsSave">Save</button>
        <span id="status" class="status" role="status"></span>
      </div>

      <div class="testrow">
        <button id="test" class="btn" data-i18n="optionsTestConnection">Test app connection</button>
        <span id="test-status" class="status" role="status"></span>
      </div>
    </main>

    <script src="i18n.js"></script>
    <script src="options.js"></script>
  </body>
</html>
