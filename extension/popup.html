<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        width: 320px;
        margin: 0;
        padding: 10px;
        font-size: 13px;
        color: #1a1a1a;
        background: #fff;
      }
      @media (prefers-color-scheme: dark) {
        body { color: #e7e7ea; background: #202226; }
        .item { border-color: #313339; }
        button { background: #2a2c31; color: #e7e7ea; border-color: #3a3c42; }
      }
      h1 { font-size: 14px; margin: 0 0 8px; }
      .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
      .item { border: 1px solid #e2e2e6; border-radius: 7px; padding: 6px 8px; margin-bottom: 6px; }
      .item .u { font-size: 11px; color: #888; word-break: break-all; }
      .tag { font-size: 10px; text-transform: uppercase; color: #3b82f6; font-weight: 600; }
      button { border: 1px solid #ccc; border-radius: 6px; background: #f3f3f5; cursor: pointer; padding: 3px 8px; }
      .empty { color: #888; padding: 10px 0; }
      a { color: #3b82f6; }
    </style>
  </head>
  <body>
    <h1>Linux Download Manager</h1>
    <div class="row">
      <label><input type="checkbox" id="enabled" /> Catch downloads</label>
      <a href="#" id="opts">Options</a>
    </div>
    <div class="row"><strong>Media on this page</strong><button id="grabpage">Grab page video</button></div>
    <div id="media"><p class="empty">No media detected.</p></div>
    <script src="popup.js"></script>
  </body>
</html>
