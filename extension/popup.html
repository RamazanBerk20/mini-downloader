<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="ui.css" />
  </head>
  <body class="popup">
    <header class="pop-head">
      <h1 class="wordmark">Mini Downloader</h1>
      <label class="catch">
        <span data-i18n="popupCatchDownloads">Catch downloads</span>
        <span class="switch">
          <input type="checkbox" id="enabled" />
          <span class="track"></span>
        </span>
      </label>
    </header>

    <main class="pop-main">
      <div class="sec-head">
        <h2 data-i18n="popupMediaOnPage">Media on this page</h2>
        <button id="grabpage" class="btn btn-primary" data-i18n="popupGrabPageVideo">Grab page video</button>
      </div>
      <div id="media" class="media-list">
        <p class="empty" data-i18n="popupNoMedia">No media detected.</p>
      </div>
    </main>

    <footer class="pop-foot">
      <a href="#" id="opts" data-i18n="popupOptions">Options</a>
    </footer>

    <script src="i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
